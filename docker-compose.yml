version: '3.9'
services:
  backend:
    build: ./backend
    container_name: evaluateai-backend
    ports: ["8001:8000"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DB_PATH=/data/evaluateai.db
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
    container_name: evaluateai-frontend
    ports: ["3000:3000"]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
volumes:
  sqlite_data:
